name: Deploy Vite to GitHub Pages

on:
  push:
    branches: ['main'] # ถ้า branch หลักคุณชื่อ master ให้เปลี่ยนตรงนี้เป็น master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install dependencies
        run: npm install
        working-directory: ./docs # บอกให้มันเข้าไปลงโปรแกรมในโฟลเดอร์ docs
        
      - name: Build
        run: npm run build
        working-directory: ./docs # บอกให้มันเข้าไป build ในโฟลเดอร์ docs
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs/dist' # เอาโฟลเดอร์ dist ที่ build เสร็จแล้วอัปโหลดขึ้นไป
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4